<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Event Budget App{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-wallet"></i>
            <span>EventApp</span>
        </div>
        <div class="nav-links">
            <a href="/dashboard" class="nav-item {% if request.path == '/dashboard' %}active{% endif %}">
                <i class="fas fa-chart-pie"></i>
                <span>Dashboard</span>
            </a>
            <a href="/create_event" class="nav-item {% if request.path == '/create_event' %}active{% endif %}">
                <i class="fas fa-plus-circle"></i>
                <span>Create Event</span>
            </a>
            <a href="/vendors" class="nav-item {% if request.path == '/vendors' %}active{% endif %}">
                <i class="fas fa-search-dollar"></i>
                <span>Find Vendors</span>
            </a>
            <a href="/add_expense" class="nav-item {% if request.path == '/add_expense' %}active{% endif %}">
                <i class="fas fa-receipt"></i>
                <span>Add Expense</span>
            </a>
            <a href="/logout" class="nav-item logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
